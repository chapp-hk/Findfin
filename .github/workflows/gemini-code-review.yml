name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  gemini-code-review:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gemini CLI Action for Code Review
        id: gemini_review
        uses: google-gemini/gemini-cli-action@v1
        with:
          command: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Add PR comment with Gemini review result
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.gemini_review.outputs.result }}`;
            if (output && output.trim().length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `**Gemini Code Review:**\n\n${output}`
              });
            }
