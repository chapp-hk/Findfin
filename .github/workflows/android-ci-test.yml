name: android ci test

on:
  workflow_call:
    secrets:
      GOOGLE_SERVICE_JSON_DEBUG:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      matrix:
        api-level: [ 33 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Google Services JSON File
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICE_JSON_DEBUG }}
        run: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > app/google-services.json

      - name: Setup local properties for Jacoco
        run: |
          echo "JACOCO_BUILD_VARIANT=debug" >> local.properties
          echo "JACOCO_INSTRUMENT_TEST_TYPE=CONNECTED_DEVICE" >> local.properties
          echo "JACOCO_GRADLE_MANAGED_DEVICE_NAME=pixel8api34" >> local.properties

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD path
        run: |
          mkdir -p /home/runner/.android/avd/test.avd/

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          script: ./gradlew rootJacocoCoverageReport

      - name: Upload jacoco coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: '**/build/reports/jacoco/rootJacocoCoverageReport'

      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/rootJacocoCoverageReport/rootJacocoCoverageReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 80
