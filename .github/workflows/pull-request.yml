name: pull request

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-workflow-lint:
    name: lint
    uses: ./.github/workflows/android-ci-lint.yml
    secrets: inherit

  call-workflow-test:
    name: test
    uses: ./.github/workflows/android-ci-test.yml
    secrets: inherit
