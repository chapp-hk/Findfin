name: pull request

on:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-workflow-lint:
    name: lint
    uses: ./.github/workflows/android-ci-lint.yml
  call-workflow-instrument-test:
    name: instrument test
    needs: call-workflow-lint
    uses: ./.github/workflows/android-ci-instrument-test.yml
