name: android ci lint

on:
  workflow_call:
    secrets:
      GOOGLE_SERVICE_JSON_DEBUG:
        required: true

jobs:
  android-lint:
    name: android lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Create Google Services JSON File

        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICE_JSON_DEBUG }}
        run: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > app/google-services.json
      - name: lint
        run: |
          echo "JACOCO_INSTRUMENT_TEST_TYPE=CONNECTED_DEVICE" >> ./local.properties
          ./gradlew lintDebug
          cat app/build/reports/lint-results-debug.txt

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: ktlint check
        run: |
          echo "JACOCO_INSTRUMENT_TEST_TYPE=CONNECTED_DEVICE" >> ./local.properties
          ./gradlew ktlintCheck

  detekt:
    name: detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: detekt check
        run: |
          echo "JACOCO_INSTRUMENT_TEST_TYPE=CONNECTED_DEVICE" >> ./local.properties
          ./gradlew detekt

  konsist:
    name: konsist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: konsist check
        run: |
          echo "JACOCO_INSTRUMENT_TEST_TYPE=CONNECTED_DEVICE" >> ./local.properties
          ./gradlew :lint:konsist:test
